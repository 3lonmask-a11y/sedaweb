<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мои логи прогресса — Sedaweb</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <nav class="top-nav">
      <a href="index.html">Главная</a>
      <a href="admin.html">Добавить лог</a>
      <a href="setup.html">Настройка</a>
    </nav>

    <header class="page-header">
      <div class="kicker">Daily Proof Archive</div>
      <h1>Мои логи прогресса</h1>
      <p>
        Каждый лог — это маленькое доказательство: день был прожит не в пустоту,
        а в сторону навыков, красоты, денег, карьеры и взрослой жизни.
      </p>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalLogs">0</div>
        <div class="stat-label">публичных записей</div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="latestDate">—</div>
        <div class="stat-label">последний лог</div>
      </div>

      <div class="stat-card">
        <div class="stat-number">1%</div>
        <div class="stat-label">лучше каждый день</div>
      </div>
    </section>

    <section id="statusBox" class="notice">Загрузка логов...</section>
    <section id="logList" class="log-list" aria-live="polite"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const logList = document.getElementById("logList");
    const statusBox = document.getElementById("statusBox");
    const totalLogs = document.getElementById("totalLogs");
    const latestDate = document.getElementById("latestDate");

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateString) {
      if (!dateString) return "—";

      const date = new Date(dateString + "T00:00:00");

      if (Number.isNaN(date.getTime())) {
        return dateString;
      }

      return date.toLocaleDateString("ru-RU", {
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function renderLogs(logs) {
      if (!logs.length) {
        statusBox.className = "notice";
        statusBox.textContent = "Пока публичных логов нет. Добавь первый лог через admin.html.";
        logList.innerHTML = "";
        totalLogs.textContent = "0";
        latestDate.textContent = "—";
        return;
      }

      statusBox.style.display = "none";
      totalLogs.textContent = String(logs.length);
      latestDate.textContent = formatDate(logs[0].date);

      logList.innerHTML = logs.map((log) => {
        return `
          <article class="log-card">
            <div class="log-top">
              <div>
                <div class="log-category">${escapeHTML(log.category)}</div>
                <h2 class="log-title">${escapeHTML(log.title)}</h2>
              </div>
              <div class="log-date">${formatDate(log.date)}</div>
            </div>

            <div class="log-section">
              <div class="log-label">Состояние</div>
              <p class="log-text">${escapeHTML(log.mood)}</p>
            </div>

            <div class="log-section">
              <div class="log-label">Что сделано</div>
              <p class="log-text">${escapeHTML(log.proof)}</p>
            </div>

            <div class="log-section">
              <div class="log-label">Результат</div>
              <p class="log-text">${escapeHTML(log.result)}</p>
            </div>

            <div class="log-section">
              <div class="log-label">Следующий шаг</div>
              <p class="log-text">${escapeHTML(log.next_step)}</p>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadLogs() {
      if (!sedaHasSupabaseConfig()) {
        statusBox.className = "notice error";
        statusBox.innerHTML = 'Supabase ещё не подключён. Открой <a href="setup.html">setup.html</a>, вставь Project URL и anon public key.';
        return;
      }

      const client = sedaCreateSupabaseClient();

      const { data, error } = await client
        .from(window.SEDA_CONFIG.TABLE_NAME)
        .select("id,date,title,category,mood,proof,result,next_step,is_public,created_at")
        .eq("is_public", true)
        .order("date", { ascending: false })
        .order("created_at", { ascending: false });

      if (error) {
        statusBox.className = "notice error";
        statusBox.textContent = "Ошибка загрузки логов: " + error.message;
        return;
      }

      renderLogs(data || []);
    }

    loadLogs();
  </script>
</body>
</html>
